name: Build and Release Signed APK (Manual)

# This workflow is triggered manually from the Actions tab.
# It builds SIGNED RELEASE APKs (full + foss flavors) with R8 shrinking enabled,
# producing ~5 MB APKs instead of ~25 MB debug APKs.
#
# Signing: uses a freshly-generated debug keystore so no GitHub secrets are required.
# The resulting APKs are installable on any Android device that allows
# "Install from unknown sources", but they are NOT Play-Store-uploadable.
#
# To use a real release keystore instead, set these repository secrets:
#   SIGNING_KEY        (base64-encoded .jks/.keystore file)
#   KEY_STORE_PASSWORD
#   ALIAS
#   KEY_PASSWORD
# …then replace the "Generate Keystore" + "Write signing config" steps with
# the equivalent steps from .github/workflows/buildRelease.yml.

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 2.2.3). Leave empty for auto semver bump."
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark release as prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write # Needed by softprops/action-gh-release to create tags/releases

jobs:
  build:
    name: Build & Release Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for version-increment and release notes

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper # Uses the version pinned in gradle-wrapper.properties (8.2)

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Generate Debug Keystore (for release signing)
        # The keystore is written into app/ because app/build.gradle.kts uses
        # `file(storeFile)` which resolves relative to the module directory (app/),
        # NOT the project root. This matches the pattern used by the original
        # .github/workflows/buildRelease.yml workflow.
        run: |
          keytool -genkey -v \
            -keystore app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Write signing config
        # storeFile is just the filename because file() in app/build.gradle.kts
        # already resolves it relative to app/.
        run: |
          {
            echo "storeFile=debug.keystore"
            echo "storePassword=android"
            echo "keyAlias=androiddebugkey"
            echo "keyPassword=android"
          } > custom.properties
          # Verify the file contents
          echo "=== custom.properties ==="
          cat custom.properties

      - name: Build Full Release APK
        run: ./gradlew assembleFullRelease -PlocalPropertiesFilePath=custom.properties --no-daemon --no-parallel

      - name: Build FOSS Release APK
        run: ./gradlew assembleFossRelease -PlocalPropertiesFilePath=custom.properties --no-daemon --no-parallel

      - name: Locate Built APKs
        id: apk
        run: |
          set -e
          FULL_APK=$(find app/build/outputs/apk/full/release -name "*.apk" -type f | head -1)
          FOSS_APK=$(find app/build/outputs/apk/foss/release -name "*.apk" -type f | head -1)

          if [ -z "$FULL_APK" ]; then
            echo "ERROR: Full APK not found!"
            exit 1
          fi
          if [ -z "$FOSS_APK" ]; then
            echo "ERROR: FOSS APK not found!"
            exit 1
          fi

          echo "Full APK: $FULL_APK"
          echo "FOSS APK: $FOSS_APK"

          # Copy to a clean staging dir with friendly names
          mkdir -p staging
          cp "$FULL_APK" "staging/NovelDokusha-full-release.apk"
          cp "$FOSS_APK" "staging/NovelDokusha-foss-release.apk"

          ls -la staging/

      - name: Determine Next SemVer Version
        if: ${{ !inputs.version_name }}
        id: version_auto
        uses: reecetech/version-increment@2024.4.3
        with:
          scheme: semver
          increment: patch

      - name: Set Final Version
        id: version
        run: |
          if [ -n "${{ inputs.version_name }}" ]; then
            echo "v-version=v${{ inputs.version_name }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version_name }}" >> $GITHUB_OUTPUT
          else
            echo "v-version=${{ steps.version_auto.outputs.v-version }}" >> $GITHUB_OUTPUT
            echo "version=${{ steps.version_auto.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.v-version }}
          name: Release ${{ steps.version.outputs.version }}
          files: |
            staging/NovelDokusha-full-release.apk
            staging/NovelDokusha-foss-release.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
