name: Release Full

# Manually-triggered release build for the Full flavor (includes Gemini /
# Google Translate integration). Same signing and verification as Release
# FOSS, just for the Full flavor.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   SIGNING_KEY         base64-encoded .jks keystore
#   KEY_STORE_PASSWORD  keystore password
#   ALIAS               key alias inside the keystore
#   KEY_PASSWORD        key password

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 2.2.9) — must match versionName in app/build.gradle.kts'
        required: false
        type: string

jobs:
  build:
    name: Build, Sign & Release Full APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify gradle wrapper is present
        run: |
          chmod +x ./gradlew
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "::error::gradle/wrapper/gradle-wrapper.jar is missing or empty."
            exit 1
          fi
          echo "✓ gradle-wrapper.jar is present ($(stat -c%s gradle/wrapper/gradle-wrapper.jar) bytes)"

      - name: "Fail-fast: verify applicationId in source"
        run: |
          if ! grep -Eq '^\s*applicationId = "com\.paras\.noveldokusha"' app/build.gradle.kts; then
            echo "::error::applicationId in app/build.gradle.kts is NOT com.paras.noveldokusha."
            echo "This is a publish-blocker. Fix it before triggering a release."
            echo "See BUILD.md §Precautions for why this keeps getting reverted."
            exit 1
          fi
          echo "✓ applicationId verified in source"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-full-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-release-full-${{ runner.os }}-

      - name: Setup APK signing keystore
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "::error::SIGNING_KEY secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$KEY_STORE_PASSWORD" ] || [ -z "$ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::One or more signing secrets are missing (KEY_STORE_PASSWORD / ALIAS / KEY_PASSWORD)."
            exit 1
          fi
          echo -n "$SIGNING_KEY" | base64 -d > app/noveldokusha-release.jks
          {
            echo "storeFile=noveldokusha-release.jks"
            echo "storePassword=$KEY_STORE_PASSWORD"
            echo "keyAlias=$ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > ci-signing.properties
          echo "✓ Keystore and signing config created"

      - name: Build release APK (Full flavor)
        run: |
          ./gradlew assembleFullRelease \
            --no-daemon \
            --no-configuration-cache \
            --console=plain \
            --stacktrace \
            -PlocalPropertiesFilePath=ci-signing.properties

      - name: Re-sign APK with v1 + v2 signature
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0
          KEYSTORE=app/noveldokusha-release.jks

          APK_LIST=$(find app/build/outputs/apk/full/release -name '*.apk')
          if [ -z "$APK_LIST" ]; then
            echo "::error::No Full release APK produced"
            exit 1
          fi

          for apk in $APK_LIST; do
            echo "=== Re-signing $apk ==="

            cp "$apk" /tmp/unsigned.apk
            (cd /tmp && zip -d unsigned.apk 'META-INF/*' > /dev/null)

            $BUILD_TOOLS/zipalign -f 4 /tmp/unsigned.apk /tmp/aligned.apk

            # CRITICAL: v1 MUST be enabled. TV/OEM package installers
            # often REQUIRE v1 / JAR signing — without it, the APK is
            # reported as "corrupt" and can break the installer itself.
            # See BUILD.md §Signing.
            $BUILD_TOOLS/apksigner sign \
              --ks "$KEYSTORE" \
              --ks-key-alias "$ALIAS" \
              --ks-pass "pass:$KEY_STORE_PASSWORD" \
              --key-pass "pass:$KEY_PASSWORD" \
              --v1-signing-enabled true \
              --v2-signing-enabled true \
              --v3-signing-enabled false \
              --v4-signing-enabled false \
              --min-sdk-version 23 \
              --out "$apk" \
              /tmp/aligned.apk

            rm /tmp/unsigned.apk /tmp/aligned.apk
          done

      - name: "Fail-fast: verify v1+v2 signing + applicationId + versionCode"
        env:
          EXPECTED_APP_ID: com.paras.noveldokusha
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0

          for apk in app/build/outputs/apk/full/release/*.apk; do
            echo "=== Verifying $apk ==="

            # --- 1. Signature verification ---
            echo "--- Signature verification ---"
            $BUILD_TOOLS/apksigner verify --verbose --min-sdk-version 23 "$apk" > /tmp/verify.txt 2>&1 || {
              echo "::error::apksigner verify failed"
              cat /tmp/verify.txt
              exit 1
            }
            cat /tmp/verify.txt | head -12

            if ! grep -q "Verified using v1 scheme (JAR signing): true" /tmp/verify.txt; then
              echo "::error::APK is NOT signed with v1 (JAR) scheme."
              echo "This WILL break TV/OEM package installers. Refusing to release."
              echo "See BUILD.md §Signing for the fix."
              exit 1
            fi
            if ! grep -q "Verified using v2 scheme (APK Signature Scheme v2): true" /tmp/verify.txt; then
              echo "::error::APK is NOT signed with v2 scheme."
              exit 1
            fi
            echo "✓ v1 + v2 signing verified"

            # --- 2. applicationId verification ---
            echo "--- Package verification ---"
            BADGE=$($BUILD_TOOLS/aapt dump badging "$apk" | grep -E "^package:" | head -1)
            echo "$BADGE"
            if ! echo "$BADGE" | grep -q "name='$EXPECTED_APP_ID'"; then
              echo "::error::applicationId is NOT $EXPECTED_APP_ID — refusing to release."
              exit 1
            fi
            echo "✓ applicationId verified"
          done

      - name: Create APK env info entries, move APK
        run: python .github/build_scripts/extract_info.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NovelDokusha v${{ env.APP_VERSION }} (Full)
          tag_name: v${{ env.APP_VERSION }}-full
          files: ${{ env.APK_FILE_PATH_full }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: |
          rm -f app/noveldokusha-release.jks ci-signing.properties

      - name: Upload build reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: release-full-build-reports
          path: |
            **/build/reports/
            **/build/outputs/logs/
          if-no-files-found: warn
          retention-days: 7
