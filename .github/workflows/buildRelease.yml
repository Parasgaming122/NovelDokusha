name: Publish Release

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
    inputs:
      version_name:
        description: 'Version name (e.g. 2.2.9) — must match versionName in app/build.gradle.kts'
        required: false
        type: string

jobs:
  buildRelease:
    name: Build & Sign Release APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-release-${{ runner.os }}-

      - name: Setup APK signing keystore
        run: |
          echo -n "${{ secrets.SIGNING_KEY }}" | base64 -d > app/noveldokusha-release.jks
          cat > ci-signing.properties <<EOF
          storeFile=noveldokusha-release.jks
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyAlias=${{ secrets.ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
          echo "Keystore and signing config created."

      - name: Build release APK (Full flavor)
        run: |
          ./gradlew assembleFullRelease \
            --no-daemon \
            --no-configuration-cache \
            --console=plain \
            --stacktrace \
            -PlocalPropertiesFilePath=ci-signing.properties

      - name: Build release APK (FOSS flavor)
        run: |
          ./gradlew assembleFossRelease \
            --no-daemon \
            --no-configuration-cache \
            --console=plain \
            --stacktrace \
            -PlocalPropertiesFilePath=ci-signing.properties

      - name: Re-sign APKs with v1 + v2 signature
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0
          KEYSTORE=app/noveldokusha-release.jks
          ALIAS=${{ secrets.ALIAS }}
          KS_PASS=${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASS=${{ secrets.KEY_PASSWORD }}

          for apk in \
              app/build/outputs/apk/full/release/*.apk \
              app/build/outputs/apk/foss/release/*.apk; do
            if [ ! -f "$apk" ]; then
              echo "WARN: $apk not found, skipping"
              continue
            fi
            echo "=== Re-signing $apk ==="

            # 1. Strip existing signature
            cp "$apk" /tmp/unsigned.apk
            (cd /tmp && zip -d unsigned.apk 'META-INF/*' > /dev/null)

            # 2. Zipalign (required for v2 signing)
            $BUILD_TOOLS/zipalign -f 4 /tmp/unsigned.apk /tmp/aligned.apk

            # 3. Sign with v1 + v2
            $BUILD_TOOLS/apksigner sign \
              --ks "$KEYSTORE" \
              --ks-key-alias "$ALIAS" \
              --ks-pass "pass:$KS_PASS" \
              --key-pass "pass:$KEY_PASS" \
              --v1-signing-enabled true \
              --v2-signing-enabled true \
              --v3-signing-enabled false \
              --v4-signing-enabled false \
              --min-sdk-version 23 \
              --out "$apk" \
              /tmp/aligned.apk

            # 4. Verify
            echo "--- Verification ---"
            $BUILD_TOOLS/apksigner verify --verbose --min-sdk-version 23 "$apk" | head -8
            echo "--- Metadata ---"
            $BUILD_TOOLS/aapt dump badging "$apk" | grep -E "package:|versionName|versionCode" | head -2

            rm /tmp/unsigned.apk /tmp/aligned.apk
          done

      - name: Create APK env info entries, move APK
        run: |
          python .github/build_scripts/extract_info.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NovelDokusha v${{ env.APP_VERSION }}
          tag_name: v${{ env.APP_VERSION }}
          files: |
            ${{ env.APK_FILE_PATH_full }}
            ${{ env.APK_FILE_PATH_foss }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: |
          rm -f app/noveldokusha-release.jks ci-signing.properties
