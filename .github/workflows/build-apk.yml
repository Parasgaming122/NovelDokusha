name: Build and Release Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Also allow manual trigger from Actions tab

permissions:
  contents: write # Needed by softprops/action-gh-release to create tags/releases

jobs:
  build:
    name: Build & Release Android APK (full + foss)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for version-increment and release notes

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper # Uses the version pinned in gradle-wrapper.properties (8.2)

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Full Debug APK
        run: ./gradlew assembleFullDebug --no-daemon --no-parallel

      - name: Build FOSS Debug APK
        run: ./gradlew assembleFossDebug --no-daemon --no-parallel

      - name: Locate Built APKs
        id: apk
        run: |
          set -e
          FULL_APK=$(find app/build/outputs/apk/full/debug -name "*.apk" -type f | head -1)
          FOSS_APK=$(find app/build/outputs/apk/foss/debug -name "*.apk" -type f | head -1)

          if [ -z "$FULL_APK" ]; then
            echo "ERROR: Full APK not found!"
            exit 1
          fi
          if [ -z "$FOSS_APK" ]; then
            echo "ERROR: FOSS APK not found!"
            exit 1
          fi

          echo "Full APK: $FULL_APK"
          echo "FOSS APK: $FOSS_APK"

          # Copy to a clean staging dir with friendly names
          mkdir -p staging
          cp "$FULL_APK" "staging/NovelDokusha-full-debug.apk"
          cp "$FOSS_APK" "staging/NovelDokusha-foss-debug.apk"

          echo "full_apk=staging/NovelDokusha-full-debug.apk" >> $GITHUB_OUTPUT
          echo "foss_apk=staging/NovelDokusha-foss-debug.apk" >> $GITHUB_OUTPUT

      - name: Determine Next SemVer Version
        id: version
        uses: reecetech/version-increment@2024.4.3
        with:
          scheme: semver
          increment: patch

      - name: Create Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.v-version }}
          name: Release ${{ steps.version.outputs.v-version }}
          files: |
            ${{ steps.apk.outputs.full_apk }}
            ${{ steps.apk.outputs.foss_apk }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
