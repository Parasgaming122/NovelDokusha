name: CI Compile Check

# -----------------------------------------------------------------------------
# Lightweight compile verification on every push / PR.
# Builds only the debug APK for ONE flavor (fastest signal that the code
# compiles). For signed release APKs and GitHub releases, use the
# "Build & Release Signed APK" workflow (build-release-manual.yml) instead.
# -----------------------------------------------------------------------------

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  compile-check:
    name: Compile Check (FOSS Debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK (FOSS flavor only — fastest compile signal)
        run: ./gradlew assembleFossDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: foss-debug-apk
          path: app/build/outputs/apk/foss/debug/*.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Upload build reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-reports
          path: |
            **/build/reports/
            **/build/outputs/logs/
          if-no-files-found: warn
          retention-days: 7
