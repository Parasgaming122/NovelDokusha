name: Build APK

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK (FOSS flavor)
        run: ./gradlew assembleFossDebug --no-daemon --no-configuration-cache --console=plain --stacktrace

      - name: Build release APK (FOSS flavor)
        run: ./gradlew assembleFossRelease --no-daemon --no-configuration-cache --console=plain --stacktrace

      - name: Build debug APK (Full flavor)
        run: ./gradlew assembleFullDebug --no-daemon --no-configuration-cache --console=plain --stacktrace

      - name: Build release APK (Full flavor)
        run: ./gradlew assembleFullRelease --no-daemon --no-configuration-cache --console=plain --stacktrace

      - name: Run unit tests
        run: ./gradlew test --no-daemon --no-configuration-cache --console=plain
        continue-on-error: true

      - name: Verify APK metadata
        run: |
          for apk in app/build/outputs/apk/full/release/*.apk app/build/outputs/apk/foss/release/*.apk; do
            if [ -f "$apk" ]; then
              echo "=== $apk ==="
              $ANDROID_HOME/build-tools/34.0.0/aapt dump badging "$apk" | grep -E "package:|versionName|versionCode|application-label:" | head -3
            fi
          done

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: APKs-debug
          path: |
            app/build/outputs/apk/foss/debug/*.apk
            app/build/outputs/apk/full/debug/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: APKs-release
          path: |
            app/build/outputs/apk/foss/release/*.apk
            app/build/outputs/apk/full/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-reports
          path: |
            **/build/reports/
            **/build/outputs/logs/
          if-no-files-found: warn
          retention-days: 7
