name: UI Tests

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
    branches: [ master, main ]
    paths:
      - 'app/**'
      - 'features/**'
      - 'coreui/**'

jobs:
  ui_test:
    name: Run Android UI tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-uitest-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-uitest-${{ runner.os }}-

      - name: Run UI tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          script: ./gradlew :app:connectedFullDebugAndroidTest --no-daemon --no-configuration-cache --console=plain

      - name: Pull test video recordings
        if: always()
        run: |
          mkdir -p /tmp/test_recordings
          adb -e pull /sdcard/test_recordings /tmp/test_recordings 2>/dev/null || echo "No recordings to pull"

      - name: Archive test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-recordings
          path: /tmp/test_recordings
          if-no-files-found: warn
